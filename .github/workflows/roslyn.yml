name: .NET Roslyn Analysis & Format

permissions:
  contents: read

on:
  pull_request:
    branches: [ "main" ]

jobs:
  analyze-and-format:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies 
        run: dotnet restore

      - name: Build (triggers Roslyn analyzers)
        run: dotnet build --no-restore --configuration Release /p:TreatWarningsAsErrors=true

      - name: Run Roslyn analyzers explicitly
        run: dotnet build --no-restore /p:RunAnalyzers=true /p:EnforceCodeStyleInBuild=true

      - name: Check formatting
        run: dotnet format --verify-no-changes --verbosity diagnostic
